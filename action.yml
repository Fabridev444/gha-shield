name: 'gha-shield — Workflow Security Scanner'
description: 'Scan .github/workflows/ YAMLs for 13 security issues (unpinned actions, command injection, hardcoded secrets, missing permissions, more). Pure Node, no install, no network.'
author: 'Fabridev444'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  path:
    description: 'Glob or directory to scan'
    required: false
    default: '.github/workflows'
  fail-on:
    description: 'Severity at which the job fails. One of: never, low, med, high, crit'
    required: false
    default: 'high'
  format:
    description: 'Output format: text | json | github | sarif'
    required: false
    default: 'github'
  sarif-file:
    description: 'Where to write the SARIF output when format=sarif'
    required: false
    default: 'gha-shield.sarif'

outputs:
  findings_count:
    description: 'Total findings across all scanned files'
  crit_count:
    description: 'Number of critical findings'
  high_count:
    description: 'Number of high findings'

runs:
  using: 'node20'
  main: 'action/index.cjs'
